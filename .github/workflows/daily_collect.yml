name: Daily Instagram Collect

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 9:00 JST (= 00:00 UTC)
  workflow_dispatch:       # 手動実行ボタン

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Create .env from secrets
        run: |
          echo "IG_ACCOUNT_ID=${{ secrets.IG_ACCOUNT_ID }}" >> .env
          echo "PAGE_TOKEN=${{ secrets.PAGE_TOKEN }}" >> .env
          echo "APP_ID=${{ secrets.APP_ID }}" >> .env
          echo "APP_SECRET=${{ secrets.APP_SECRET }}" >> .env

      - name: Collect follower data
        run: python collect.py

      - name: Export CSV
        run: python update_sheets.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add instagram_tracker.db exports/
          git diff --cached --quiet || git commit -m "Daily collect $(date +%Y-%m-%d)"
          git push
